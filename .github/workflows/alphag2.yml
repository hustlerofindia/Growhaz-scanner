name: GROWHAZ Security Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan (e.g., https://example.com)'
        required: true
        type: string
      login_credential:
        description: 'Login credential (email or phone) for authenticated testing'
        required: false
        type: string
      login_password:
        description: 'Password for login'
        required: false
        type: string
      report_id:
        description: 'Supabase report ID to update (optional)'
        required: false
        type: string
  # Uncomment below to run on push to main branch (adjust as needed)
  # push:
  #   branches: [ main ]
  # schedule:
  #   - cron: '0 2 * * 0'  # Weekly scan every Sunday at 2am

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 cryptography pyjwt playwright
          # Install Playwright browsers (optional, for JavaScript crawling)
          playwright install chromium --with-deps

      - name: Run GROWHAZ security scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          REPORT_ID: ${{ github.event.inputs.report_id || secrets.REPORT_ID }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}  # For out-of-band testing (optional)
        run: |
          python s3cure3.py "${{ github.event.inputs.target_url }}" \
            --report-id "$REPORT_ID" \
            --login "${{ github.event.inputs.login_credential }}" \
            --password "${{ github.event.inputs.login_password }}"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            security_report.json
            security_report.md
          if-no-files-found: warn

      - name: Display summary
        run: |
          echo "## Scan completed" >> $GITHUB_STEP_SUMMARY
          if [ -f security_report.md ]; then
            cat security_report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi
